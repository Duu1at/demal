name: demal
description: Demal App.
publish_to: none

environment:
  sdk: ^3.10.1

workspace:
  - app
  - packages/api_client
  - packages/app_ui
  - packages/storage
  - packages/auth_repository
  - packages/tour_repository
  - packages/profile_repository
  - packages/bookings_repository
  - packages/upload_repository
  - packages/core

dependencies:
  bloc_concurrency: ^0.3.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  connectivity_plus: ^7.0.0
  dio: ^5.9.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_cache_manager: ^3.4.1
  flutter_svg: ^2.2.3
  go_router: ^17.0.0
  image_picker: ^1.2.1
  infinite_scroll_pagination: ^5.1.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  latlong2: ^0.9.1
  loader_overlay: ^5.0.0
  mask_text_input_formatter: ^2.9.0
  permission_handler: ^12.0.1
  pinput: ^6.0.1
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.3
  smart_auth: ^3.2.0
  stream_transform: ^2.1.1
  talker_bloc_logger: ^5.1.3
  talker_dio_logger: ^5.1.3
  talker_flutter: ^5.1.3
  toastification: ^3.0.3
  url_launcher: ^6.3.2
  file_picker: ^10.3.8
  firebase_core: ^4.3.0
  firebase_analytics: ^12.1.0
  firebase_crashlytics: ^5.0.6
  firebase_remote_config: ^6.1.3
  package_info_plus: ^9.0.0
  google_sign_in: ^7.2.0
  supabase_flutter: ^2.12.0

dev_dependencies:
  melos: ^7.3.0
  very_good_analysis: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.10.4
  flutter_gen_runner: ^5.12.0
  json_serializable: ^6.11.3
  flutter_native_splash: ^2.4.7

melos:
  command:
    bootstrap:
      runPubGetInParallel: false
      usePubspecOverrides: true

  scripts:
    format:
      exec: dart format . --line-length 120
      select-package:
        dir-exists: lib
      description: "Format Dart code for selected package"

    format-all:
      run: melos exec -- dart format . --line-length 120
      description: "Format all Dart code in every package"

    format-check:
      run: melos exec -- dart format . --line-length 120 --set-exit-if-changed
      description: "Check format for all Dart code"

    analyze:
      run: melos exec -- flutter analyze
      description: "Analyze all Dart code"

    analyze-check:
      run: melos exec -- flutter analyze --fatal-warnings
      description: "Analyze all Dart code and exit if there are any fatal warnings"

    flutter-clean:
      exec: flutter clean
      select-package:
        dir-exists: lib
      description: "Run 'flutter clean' for a selected package"

    pub-get:
      exec: flutter pub get
      select-package:
        dir-exists: lib
      description: "Run 'flutter pub get' for a selected package"

    test:
      exec: flutter test
      select-package:
        dir-exists: test
      description: "Run unit tests for a selected package"

    unit-test:
      run: melos exec -- flutter test
      description: "Run unit tests for all packages"

    doctor:
      run: flutter doctor
      description: "Run Flutter doctor"

    run-build-runner:
      run: |
        melos exec --scope="core" -- flutter pub run build_runner build --delete-conflicting-outputs
        melos exec --ignore="core" --depends-on="build_runner" --concurrency=1 -- flutter pub run build_runner build --delete-conflicting-outputs
        melos format-all
      description: "Generate code with build_runner for relevant packages"

    run-app:
      run: melos exec --scope="app" -- flutter run
      description: "Run the main application"

    build-apk:
      run: melos exec --scope="app" -- flutter build apk
      description: "Build an APK file for the main application"

    build-ios:
      run: melos exec --scope="app" -- flutter build ios --release --no-codesign
      description: "Build an unsigned release IPA for iOS"

    build-appbundle:
      run: melos exec --scope="app" -- flutter build appbundle --obfuscate --split-debug-info=./build/app/outputs/symbols
