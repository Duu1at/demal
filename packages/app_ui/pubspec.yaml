name: app_ui
description: Demal APP UI package.
version: 0.0.1
resolution: workspace

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  core: 
  storage:
  flutter_svg: 
  flutter_cache_manager:
  cached_network_image:
  shimmer:
  go_router:


dev_dependencies:
  build_runner:
  json_serializable:
  flutter_gen_runner:
  very_good_analysis:

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_gen:
  assets:
    enabled: true
    outputs:
      package_parameter_enabled: true
  output: lib/src/generated/
  line_length: 120

  integrations:
    flutter_svg: true       